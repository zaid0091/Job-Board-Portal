<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default SEO -->
    <title>Jobly</title>
    <meta name="description" content="Find your dream job or hire top talent. Browse thousands of curated job listings across industries." />
    <meta name="keywords" content="jobs, hiring, career, employment, job search, remote jobs, tech jobs" />
    <meta name="author" content="Jobly" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph Default -->
    <meta property="og:site_name" content="Jobly" />
    <meta property="og:title" content="Jobly — Find Your Dream Job" />
    <meta property="og:description" content="Find your dream job or hire top talent. Browse thousands of curated job listings across industries." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jobly.com" />
    <meta property="og:image" content="https://jobly.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Default -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@jobly" />
    <meta name="twitter:title" content="Jobly — Find Your Dream Job" />
    <meta name="twitter:description" content="Find your dream job or hire top talent. Browse thousands of curated job listings across industries." />
    <meta name="twitter:image" content="https://jobly.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Apply theme class immediately to prevent flash of wrong theme
      (function() {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

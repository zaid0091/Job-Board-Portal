# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Mounts source code, enables hot reload, uses dev settings.

services:
  backend:
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

  celery_worker:
    command: celery -A config.celery worker -l debug --concurrency=2
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

  celery_beat:
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

  # Don't run nginx in dev — frontend dev server handles it
  nginx:
    profiles:
      - production
